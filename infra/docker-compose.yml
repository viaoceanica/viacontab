services:
  postgres:
    image: postgres:15
    container_name: viacontab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: viacontab
      POSTGRES_PASSWORD: viacontab
      POSTGRES_DB: viacontab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viacontab -d viacontab"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: viacontab-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ../backend
    container_name: viacontab-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://viacontab:viacontab@postgres:5432/viacontab
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-gpt-5.4-mini}
      NIF_PT_API_KEY: ${NIF_PT_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      PYTHONPATH: /app
      DEBUG_LEARNING: ${DEBUG_LEARNING:-false}
      MAX_QR_SCAN_SECONDS: ${MAX_QR_SCAN_SECONDS:-12}
      MAX_QR_SCAN_PAGES: ${MAX_QR_SCAN_PAGES:-4}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_PRESIGN_EXPIRY_SECONDS: ${R2_PRESIGN_EXPIRY_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8100:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
        SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://backend:8000}
    container_name: viacontab-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-}
      SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://backend:8000}
      NEXT_PUBLIC_DEBUG_LEARNING: ${NEXT_PUBLIC_DEBUG_LEARNING:-false}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "7100:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 25s

volumes:
  postgres_data:
  qdrant_data:
